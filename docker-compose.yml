services:
  flowise:
    image: flowiseai/flowise:latest
    restart: always
    env_file: .env
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./flowise_data:/root/.flowise
      - ./logs/flowise:/root/.flowise/logs
    networks:
      - agent-net

  engine:
    build: .
    restart: always
    env_file: .env
    ports:
      - "${ENGINE_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src
      - ./logs/engine:/app/logs
    # uv uvicorn allows for hot-reloading during development
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge
