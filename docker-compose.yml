services:
  flowise:
    image: flowiseai/flowise:latest
    restart: always
    env_file: .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ../shared-flowise/flowise_data:/root/.flowise
      - ../shared-flowise/logs/flowise:/root/.flowise/logs
    healthcheck:
      # Hitting root '/' is the most reliable way to avoid 401 errors 
      # while confirming the web server is up.
      test: [ "CMD-SHELL", "curl -f http://127.0.0.1:${PORT:-3000}/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge
